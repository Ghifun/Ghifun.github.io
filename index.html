<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillGhifun | Open Source Projects</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        /* 确保 html 和 body 占满全屏且无溢出 */
        html, body {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            flex: 1 0 auto; /* 核心：让内容区占据除 footer 外的所有空间 */
            display: flex;
            flex-direction: column;
            padding: 60px 20px 0 20px; /* 底部 padding 设为 0 */
            box-sizing: border-box;
        }

        header {
            margin-bottom: 60px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #1e293b, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 28px;
            text-align: left;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary-color);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--primary-color);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h3 {
            margin: 0 0 12px 0;
            font-size: 1.25rem;
            color: #1e293b;
            display: flex;
            align-items: center;
        }

        .card h3 svg {
            margin-right: 8px;
            color: var(--primary-color);
        }

        .card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .tag {
            display: inline-block;
            background: #eff6ff;
            color: #3b82f6;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 16px;
            align-self: flex-start;
        }

        /* Footer 优化：确保紧贴底边 */
        footer {
            flex-shrink: 0; /* 防止 footer 被压缩 */
            padding: 30px 0;
            font-size: 0.875rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BillGhifun's Lib</h1>
        <p class="subtitle">Discovery</p>
    </header>

    <div class="project-grid">
        <a href="https://billghifun.github.io/gogdns-docs/" class="card">
            <h3>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                GOGDNS
            </h3>
            <p>高性能私人DNS服务器。</p>
            <span class="tag">Go / Network</span>
        </a>

        <a href="#" class="card">
            <h3>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                More Projects
            </h3>
            <p>即将推出更多作品，敬请期待...</p>
            <span class="tag">Upcoming</span>
        </a>
    </div>
</div> <footer>
    &copy; 2026 BillGhifun. Powered by Passion & Code.
</footer>

</body>
</html>
